<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeamPro Handover Mode｜體育組長交接包</title>
<link rel="stylesheet" href="style.css?v=20260627-shell1"><link rel="stylesheet" href="role-portal.css?v=20260627-role2">
</head>
<body>
<div class="container">
  <div class="topbar"><div class="logo"><picture><source srcset="assets/logo.webp" type="image/webp"><img class="logo-img" src="assets/logo.png" width="30" height="30" alt=""></picture>TeamPro <span class="mark">Handover Mode</span></div><a class="btn btn-ghost btn-sm" href="school.html">回學校行政</a></div>
  <section class="admin-hero">
    <div class="eyebrow">體育組長交接包</div>
    <h1>換人也不怕，資料、缺漏與下一步一次交接。</h1>
  </section>
  <div class="card">
    <h3>交接包內容</h3>
    <div class="mapping-grid">
      <div class="map-card"><h3>1</h3><p>本校體育班基本資料</p></div><div class="map-card"><h3>2</h3><p>各專項隊伍名冊</p></div><div class="map-card"><h3>3</h3><p>教練名單</p></div><div class="map-card"><h3>4</h3><p>學生名冊</p></div>
      <div class="map-card"><h3>5</h3><p>年度訓練紀錄</p></div><div class="map-card"><h3>6</h3><p>比賽成果</p></div><div class="map-card"><h3>7</h3><p>傷病紀錄</p></div><div class="map-card"><h3>8</h3><p>補課紀錄</p></div>
      <div class="map-card"><h3>9</h3><p>場地設備紀錄</p></div><div class="map-card"><h3>10</h3><p>評鑑缺漏狀態</p></div><div class="map-card"><h3>11</h3><p>重要文件清單</p></div><div class="map-card"><h3>12</h3><p>下一任待辦事項</p></div>
    </div>
    <div class="export-actions">
      <button class="btn btn-primary" id="exportHandover">體育組長交接包 PDF/HTML</button>
      <button class="btn" id="exportEvidence">評鑑佐證包 ZIP/JSON</button>
      <button class="btn" id="exportCompletion">各隊資料完成率 Excel/CSV</button>
    </div>
  </div>
</div>
<script src="school-tools.js?v=20260627-role2"></script>
</body>
</html>

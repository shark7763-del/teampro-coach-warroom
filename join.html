<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日訓練回報｜TeamPro</title>
<link rel="stylesheet" href="style.css">
<style>
  .wrap { max-width: 560px; margin: 0 auto; padding-bottom: 80px; }
  .dim-block { margin-top: 18px; }
  .dim-block h3 { display:flex; justify-content:space-between; align-items:baseline; margin:0 0 4px; }
  .dim-avg { font-size:14px; color: var(--brand); font-weight:700; }
  .step { display:none; }
  .step.active { display:block; }
  .sticky-bar { position: fixed; left:0; right:0; bottom:0; background: var(--panel);
    border-top: 1px solid var(--line); padding: 12px; display:flex; gap:8px; }
  .sticky-bar .container { display:flex; gap:8px; width:min(560px,92vw); margin:0 auto; }
  .result-score { font-size: 46px; font-weight: 800; }
  .mood-row { display:flex; gap:6px; justify-content:space-between; }
  .mood-row button { flex:1; font-size: 26px; background: var(--panel-2); border:1px solid var(--line);
    border-radius:10px; padding:8px 0; cursor:pointer; }
  .mood-row button.sel { border-color: var(--brand); background: rgba(34,197,94,.12); }
  .nutri-chips { display:flex; flex-wrap:wrap; gap:6px; margin:6px 0 4px; }
  .nutri-chips button { font-size:13px; padding:5px 11px; border-radius:999px; border:1px solid var(--line);
    background:var(--panel-2); color:var(--muted); cursor:pointer; }
  .nutri-chips button.sel { border-color:var(--brand); background:rgba(34,197,94,.14); color:#86efac; font-weight:700; }
  .train-slot { display:flex; gap:8px; align-items:center; margin:6px 0; }
  .train-slot .slot-name { width:38px; color:var(--muted); font-size:14px; flex:0 0 auto; }
  .train-slot input { flex:1; }
  .train-slot .notrain { flex:0 0 auto; font-size:13px; padding:8px 12px; border-radius:10px;
    border:1px solid var(--line); background:var(--panel-2); color:var(--muted); cursor:pointer; }
  .train-slot .notrain.sel { border-color:var(--yellow); background:rgba(245,158,11,.14); color:#fcd34d; font-weight:700; }
  .consent { display:flex; gap:8px; align-items:flex-start; font-size:13px; color:var(--muted); margin-top:10px; }
  .consent input { width:auto; margin-top:3px; }
</style>
</head>
<body>

<div class="wrap container">
  <div class="topbar"><div class="logo"><img class="logo-img" src="assets/logo.png" alt="TeamPro logo">TeamPro</div><span class="muted" id="teamName"></span></div>

  <!-- 載入/錯誤 -->
  <div id="loading" class="card center"><p class="muted">載入中…</p></div>
  <div id="errorBox" class="card center hidden"><p id="errorMsg" style="color:var(--red)"></p></div>

  <!-- Step 0：選身分 -->
  <div id="step-who" class="step card">
    <h2 style="margin-top:0;">我是哪一位？</h2>
    <p class="muted">選擇你的名字開始今天的回報。</p>
    <label>選手</label>
    <select id="whoSelect"></select>
    <div class="consent">
      <input type="checkbox" id="consent">
      <label for="consent" style="margin:0;">我同意填寫並由教練查看我的訓練與身體狀態資料（未滿 18 歲已取得家長同意）。</label>
    </div>
    <button class="btn btn-primary btn-block" id="whoNext" style="margin-top:14px;">開始填寫 →</button>
    <button class="btn btn-block" id="whoPerf" style="margin-top:8px;">📈 看我的近期表現</button>
    <p class="muted" style="font-size:12px;text-align:center;margin:12px 0 0;"><a href="privacy.html" target="_blank" rel="noopener">隱私權與資料使用說明</a></p>
  </div>

  <!-- 我的近期表現 -->
  <div id="step-perf" class="step">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h2 style="margin:0;">📈 我的近期表現</h2>
        <button class="btn btn-sm" id="perfBack">← 返回</button>
      </div>
      <p class="muted" style="font-size:12px;margin:8px 0 0;">🔒 你的上次表現只有你（用 PIN）和主教練看得到，不會公開給其他隊友。</p>
      <div id="perfBody" style="margin-top:12px;"></div>
    </div>
  </div>

  <!-- Step 1：KPI 30 項 -->
  <div id="step-kpi" class="step">
    <div class="card hidden" id="lastPerfCard" style="background:rgba(34,197,94,.06);border-color:var(--brand);">
      <div id="lastPerfBody"></div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h2 style="margin:0;">今日狀態評分</h2>
        <button class="btn btn-sm" id="btnPrefill">↺ 帶入上次</button>
      </div>
      <p class="muted" style="margin:6px 0 0;">每項 1–5 分，5 分代表最好。可先「帶入上次」再微調。</p>
      <p class="muted" style="font-size:12px;margin:6px 0 0;">🔒 你填寫的訓練資料會用於教練追蹤訓練狀態，系統會依照權限保護你的個人紀錄。</p>
      <label style="margin-top:10px;">訓練日期（預設今天；漏填可往回補填，同一天會覆蓋更新）</label>
      <input id="recordDate" type="date">
      <label style="margin-top:10px;">這天是？</label>
      <select id="sessionType">
        <option value="training">訓練日（填全部）</option>
        <option value="rest">非訓練日（只填身體/心情/生理）</option>
      </select>
      <label>今日訓練課表（分時段，沒練可點「無訓練」）</label>
      <div class="train-slot"><span class="slot-name">上午</span><input id="train_am" placeholder="例：晨操、跑步 30 分"><button type="button" class="notrain" data-for="train_am">無訓練</button></div>
      <div class="train-slot"><span class="slot-name">下午</span><input id="train_pm" placeholder="例：踢靶 6 組、核心訓練"><button type="button" class="notrain" data-for="train_pm">無訓練</button></div>
      <div class="train-slot"><span class="slot-name">晚上</span><input id="train_eve" placeholder="例：實戰 3 回合、收操伸展"><button type="button" class="notrain" data-for="train_eve">無訓練</button></div>
    </div>
    <div id="kpiBlocks"></div>
  </div>

  <!-- Step 2：身體 / 飲食 / 心情 -->
  <div id="step-body" class="step">
    <div class="card">
      <h2 style="margin-top:0;">身體與飲食</h2>
      <div class="grid grid-3">
        <div><label>身高 cm</label><input id="heightCm" type="number" inputmode="decimal"></div>
        <div><label>體重 kg</label><input id="weightKg" type="number" inputmode="decimal"></div>
        <div><label>目標體重 kg</label><input id="targetWeightKg" type="number" inputmode="decimal"></div>
      </div>
      <div id="bmiBox" class="muted" style="margin:8px 0 4px;font-size:14px;"></div>
      <label>早餐</label><input id="breakfast" placeholder="例：吐司＋蛋＋豆漿">
      <div class="nutri-chips" id="nutri_breakfast"></div>
      <label>午餐</label><input id="lunch">
      <div class="nutri-chips" id="nutri_lunch"></div>
      <label>晚餐</label><input id="dinner">
      <div class="nutri-chips" id="nutri_dinner"></div>
      <div class="grid grid-3">
        <div><label>零食/飲料</label><input id="snacksDrinks"></div>
        <div><label>喝水量</label><input id="waterIntake" placeholder="例：2000cc"></div>
        <div><label>宵夜</label><input id="lateNightSnack"></div>
      </div>
    </div>
    <div class="card">
      <h2 style="margin-top:0;">今日身體監控</h2>
      <div class="grid grid-2">
        <div><label>睡眠時間（小時）</label><input id="sleepHours" type="number" inputmode="decimal" step="0.5" placeholder="例：7.5"></div>
        <div>
          <label>疲勞指數（1 很輕鬆 ～ 10 非常疲勞）</label>
          <div class="slider-row" style="margin:2px 0;">
            <div class="top"><span class="muted" id="fatigueHint">適中</span><span class="val" id="fatigueVal">5</span></div>
            <input type="range" min="1" max="10" step="1" value="5" id="fatigue">
          </div>
        </div>
      </div>
    </div>
    <div class="card">
      <h2 style="margin-top:0;">傷勢狀況</h2>
      <p class="muted" style="margin:4px 0;">有不舒服或受傷的部位嗎？點選讓教練知道。</p>
      <div class="nutri-chips" id="injuryChips"></div>
      <label>傷勢補充說明（選填）</label><input id="injuryNote" placeholder="例：右腳踝外側，落地時會痛">
    </div>
    <div class="card">
      <h2 style="margin-top:0;">今日心情</h2>
      <div class="mood-row" id="moodRow">
        <button data-m="1">😣</button><button data-m="2">😕</button><button data-m="3">😐</button>
        <button data-m="4">🙂</button><button data-m="5">😄</button>
      </div>
      <label>心情原因（選填）</label><input id="moodReason">
      <label>今天我想感謝的人事物（選填）</label><input id="gratitude">
      <label>想鼓勵的隊友（選填）</label><select id="encourageName"><option value="">—</option></select>
      <label>想對他說的鼓勵（選填）</label><input id="encourageMsg" placeholder="例：今天你的旋踢超帥，繼續加油！">
    </div>
    <div class="card">
      <h2 style="margin-top:0;">訓練心得</h2>
      <label>今天的訓練心得（學到什麼、哪裡進步、哪裡卡關）</label>
      <textarea id="trainingNotes" placeholder="例：今天旋踢轉胯更順，但實戰時防守反應還是慢半拍，下次想多練閃避。"></textarea>
      <label>想對教練說的話（選填）</label><textarea id="reflection"></textarea>
    </div>
    <div class="card">
      <label class="consent" for="consentPrivacy"><input type="checkbox" id="consentPrivacy"><span>我已閱讀並了解 <a href="privacy.html" target="_blank" rel="noopener">TeamPro 隱私權與資料使用說明</a>，並同意將本次回報提供給我的主教練作為訓練管理使用。</span></label>
      <label class="consent" for="guardianConsent"><input type="checkbox" id="guardianConsent"><span>我確認已由家長或法定代理人了解並同意使用本系統（未滿 18 歲必勾）。</span></label>
    </div>
  </div>

  <!-- Step 3：結果 -->
  <div id="step-result" class="step">
    <div class="card center">
      <h2 style="margin-top:0;">今日回報完成 🎉</h2>
      <div class="result-score" id="resScore">—</div>
      <div id="resLight"></div>
      <div id="resDims" class="muted" style="margin-top:10px;font-size:14px;"></div>
    </div>
    <div class="card">
      <h3 style="margin-top:0;">🥗 AI 飲食與恢復建議</h3>
      <div id="resAdvice" class="muted"></div>
    </div>
    <div class="card">
      <h3 style="margin-top:0;">分享文字</h3>
      <button class="btn btn-block" id="btnCopyStudent" style="margin-bottom:8px;">📋 複製給自己的摘要</button>
      <button class="btn btn-block" id="btnCopyParent">👨‍👩‍👧 複製家長版</button>
    </div>
    <button class="btn btn-primary btn-block" id="btnAgain" style="margin-top:12px;">完成</button>
  </div>
</div>

<!-- 底部導覽（KPI/身體步驟用） -->
<div class="sticky-bar hidden" id="navBar">
  <div class="container">
    <button class="btn" id="navPrev" style="flex:1;">← 上一步</button>
    <button class="btn btn-primary" id="navNext" style="flex:2;">下一步 →</button>
  </div>
</div>

<script src="api.js"></script>
<script>
(function () {
  var $ = TP.$, esc = TP.esc, toast = TP.toast;
  var params = new URLSearchParams(location.search);
  var shareToken = params.get('t') || '';
  var ctx = { team: null, athletes: [], athleteId: '', name: '', last: null, result: null };

  /* ---------- 啟動 ---------- */
  async function boot() {
    if (!TP.getUrl()) {
      // 選手端通常用教練分享的同網域，網址需內建。提示填網址。
      var u = params.get('api'); if (u) TP.setUrl(decodeURIComponent(u));
    }
    if (!shareToken) return showError('連結缺少團隊代碼，請向教練索取完整連結。');
    if (!TP.getUrl()) return showError('系統尚未設定後端網址。請教練在分享連結後加上 &api=後端網址，或聯絡教練。');
    var r = await TP.call('joinInfo', { t: shareToken });
    $('#loading').classList.add('hidden');
    if (!r.ok) return showError(r.error);
    ctx.team = r.team; ctx.athletes = r.athletes; ctx.pro = !!r.pro;
    $('#teamName').textContent = r.team.teamName;
    $('#whoSelect').innerHTML = r.athletes.length
      ? r.athletes.map(function (a) { return '<option value="' + a.athleteId + '">' + esc(a.name) + '</option>'; }).join('')
      : '<option value="">（教練尚未建立選手）</option>';
    buildKpi();
    initExtras();
    show('who');
  }

  function showError(msg) {
    $('#loading').classList.add('hidden');
    $('#errorBox').classList.remove('hidden');
    $('#errorMsg').textContent = msg;
  }

  function show(step) {
    ['who', 'kpi', 'body', 'result', 'perf'].forEach(function (s) {
      $('#step-' + s).classList.toggle('active', s === step);
    });
    $('#navBar').classList.toggle('hidden', step !== 'kpi' && step !== 'body');
    window.scrollTo(0, 0);
  }

  /* ---------- 建立 30 項滑桿 ---------- */
  function buildKpi() {
    var html = TP.KPI_DIMENSIONS.map(function (dim) {
      var rows = dim.items.map(function (it) {
        return '<div class="slider-row" data-dim="' + dim.key + '">' +
          '<div class="top"><span>' + esc(it[1]) + '</span><span class="val" id="val_' + it[0] + '">3</span></div>' +
          '<input type="range" min="1" max="5" step="1" value="3" id="kpi_' + it[0] + '" data-item="' + it[0] + '">' +
          '</div>';
      }).join('');
      return '<div class="card dim-block"><h3>' + esc(dim.name) +
        '<span class="dim-avg" id="avg_' + dim.key + '">平均 3.0</span></h3>' + rows + '</div>';
    }).join('');
    $('#kpiBlocks').innerHTML = html;
    TP.$all('input[type=range]', $('#kpiBlocks')).forEach(function (inp) {
      inp.addEventListener('input', function () { onSlide(inp); });
      paintSlider(inp);
    });
    updateAverages();
  }

  function paintSlider(inp) {
    var pct = (inp.value - 1) / 4 * 100;
    inp.style.background = 'linear-gradient(90deg, var(--brand) ' + pct + '%, var(--panel-2) ' + pct + '%)';
  }
  function onSlide(inp) {
    $('#val_' + inp.dataset.item).textContent = inp.value;
    paintSlider(inp);
    updateAverages();
  }
  function updateAverages() {
    TP.KPI_DIMENSIONS.forEach(function (dim) {
      var sum = 0, n = 0;
      dim.items.forEach(function (it) { var v = Number($('#kpi_' + it[0]).value); sum += v; n++; });
      $('#avg_' + dim.key).textContent = '平均 ' + (sum / n).toFixed(1);
    });
  }

  /* ---------- 額外欄位：營養 chips / 傷勢 / 訓練時段 / BMI / 疲勞 ---------- */
  var NUTRI = ['蛋白質', '澱粉/主食', '蔬菜', '水果', '乳製品', '好油脂'];
  var INJURY = ['頭/頸', '肩膀', '手肘', '手腕/手', '上背', '下背/腰', '髖部', '大腿', '膝蓋', '小腿', '腳踝', '腳掌'];
  var nutriSel = { breakfast: [], lunch: [], dinner: [] };
  var injurySel = [];

  function buildChipRow(containerId, options, selArr, opts) {
    opts = opts || {};
    var box = $('#' + containerId);
    box.innerHTML = '';
    if (opts.none) {  // 例如「無受傷」互斥選項
      var nb = document.createElement('button'); nb.type = 'button'; nb.textContent = opts.none;
      nb.onclick = function () {
        var on = !nb.classList.contains('sel');
        TP.$all('button', box).forEach(function (x) { x.classList.remove('sel'); });
        selArr.length = 0;
        if (on) { nb.classList.add('sel'); selArr.push('__none__'); }
      };
      box.appendChild(nb);
    }
    options.forEach(function (label) {
      var b = document.createElement('button'); b.type = 'button'; b.textContent = label;
      b.onclick = function () {
        if (opts.none) { // 點任何部位 → 取消「無受傷」
          var i = selArr.indexOf('__none__'); if (i !== -1) selArr.splice(i, 1);
          TP.$all('button', box)[0].classList.remove('sel');
        }
        var idx = selArr.indexOf(label);
        if (idx === -1) { selArr.push(label); b.classList.add('sel'); }
        else { selArr.splice(idx, 1); b.classList.remove('sel'); }
      };
      box.appendChild(b);
    });
  }

  function updateBmi() {
    var h = Number($('#heightCm').value), w = Number($('#weightKg').value);
    var box = $('#bmiBox');
    if (!h || !w) { box.textContent = ''; return; }
    var bmi = w / Math.pow(h / 100, 2);
    var cat = bmi < 18.5 ? '過輕' : (bmi < 24 ? '標準' : (bmi < 27 ? '過重' : '肥胖'));
    var color = (cat === '標準') ? 'var(--green)' : (cat === '過輕' || cat === '過重') ? 'var(--yellow)' : 'var(--red)';
    box.innerHTML = 'BMI：<b style="color:' + color + '">' + bmi.toFixed(1) + '</b>（' + cat + '）';
  }

  function initExtras() {
    buildChipRow('nutri_breakfast', NUTRI, nutriSel.breakfast, {});
    buildChipRow('nutri_lunch', NUTRI, nutriSel.lunch, {});
    buildChipRow('nutri_dinner', NUTRI, nutriSel.dinner, {});
    buildChipRow('injuryChips', INJURY, injurySel, { none: '無受傷' });

    // 訓練時段「無訓練」切換
    TP.$all('.notrain').forEach(function (b) {
      b.onclick = function () {
        var inp = $('#' + b.dataset.for);
        var on = !b.classList.contains('sel');
        b.classList.toggle('sel', on);
        inp.disabled = on; if (on) inp.value = '';
        inp.placeholder = on ? '無訓練' : inp.getAttribute('data-ph') || inp.placeholder;
      };
      var inp = $('#' + b.dataset.for); inp.setAttribute('data-ph', inp.placeholder);
    });

    // BMI 即時計算
    ['heightCm', 'weightKg'].forEach(function (id) { $('#' + id).addEventListener('input', updateBmi); });

    // 疲勞滑桿 1–10
    var fa = $('#fatigue');
    function paintFa() {
      var pct = (fa.value - 1) / 9 * 100;
      fa.style.background = 'linear-gradient(90deg, var(--brand) ' + pct + '%, var(--panel-2) ' + pct + '%)';
      $('#fatigueVal').textContent = fa.value;
      var v = Number(fa.value);
      $('#fatigueHint').textContent = v <= 3 ? '輕鬆' : (v <= 6 ? '適中' : (v <= 8 ? '偏累' : '非常疲勞'));
    }
    fa.addEventListener('input', paintFa); paintFa();

    // 訓練日期：預設台灣本地今天、上限今天（不可挑未來），可往回補填
    var dt = $('#recordDate');
    if (dt) { dt.value = localToday(); dt.max = localToday(); }
  }

  // 本地（非 UTC）日期 YYYY-MM-DD，修正晨操時段被算到前一天的時區問題
  function localToday() {
    var d = new Date();
    return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 10);
  }

  function slotVal(id) {
    var btn = $('[data-for="' + id + '"]');
    if (btn && btn.classList.contains('sel')) return '無訓練';
    return $('#' + id).value.trim();
  }

  function collectExtras() {
    return {
      breakfastNutri: nutriSel.breakfast.join(','), lunchNutri: nutriSel.lunch.join(','), dinnerNutri: nutriSel.dinner.join(','),
      trainingAM: slotVal('train_am'), trainingPM: slotVal('train_pm'), trainingEve: slotVal('train_eve'),
      trainingNotes: $('#trainingNotes').value.trim(),
      injuryAreas: injurySel.indexOf('__none__') !== -1 ? '無受傷' : injurySel.join(','),
      injuryNote: $('#injuryNote').value.trim(),
      sleepHours: $('#sleepHours').value, fatigue: $('#fatigue').value,
      encourageName: $('#encourageName').value, encourageMsg: $('#encourageMsg').value.trim()
    };
  }

  /* ---------- 選身分 ---------- */
  $('#whoNext').onclick = async function () {
    var id = $('#whoSelect').value;
    if (!id) { toast('請選擇選手', true); return; }
    if (!$('#consent').checked) { toast('請先勾選同意', true); return; }
    ctx.athleteId = id;
    ctx.name = $('#whoSelect').options[$('#whoSelect').selectedIndex].text;
    // 鼓勵隊友下拉：同隊其他人
    $('#encourageName').innerHTML = '<option value="">—</option>' + ctx.athletes
      .filter(function (a) { return a.athleteId !== id; })
      .map(function (a) { return '<option value="' + esc(a.name) + '">' + esc(a.name) + '</option>'; }).join('');
    // 預抓上次紀錄供「帶入上次」（有設 PIN 時不自動帶入，避免他人選你名字偷看；按「帶入上次」時再驗證）
    var r = await TP.call('lastRecord', { t: shareToken, athleteId: id, pin: ctx.pin });
    if (r.pinRequired) { ctx.last = null; ctx.prefillPinNeeded = true; }
    else {
      ctx.last = (r.ok && r.record) || null; ctx.prefillPinNeeded = false;
      if (ctx.last) { toast('已找到上次紀錄，可按「帶入上次」'); prefill(); }
    }
    show('kpi');
    renderLastPerfOnFill();
  };

  // 填表頁上方卡片：專業版→近 7 日折線趨勢圖（PIN 保護）；非專業版→升級解鎖賣點
  function renderLastPerfOnFill() {
    var card = $('#lastPerfCard'), body = $('#lastPerfBody');
    card.classList.remove('hidden');

    if (!ctx.pro) {
      body.innerHTML =
        '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;">' +
          '<b>📈 近 7 日表現趨勢圖</b><span class="pill yellow" style="font-size:11px;">🔒 專業版解鎖</span></div>' +
        '<p class="muted" style="font-size:12px;margin:8px 0 0;">升級專業版後，這裡會自動顯示你近 7 天的總分折線趨勢，一眼看出狀態起伏。</p>';
      return;
    }

    if (ctx.pin) { loadSeven(false); return; }
    if (ctx.prefillPinNeeded) { pinBox(false); return; }
    pinBox(true);

    function pinBox(setMode) {
      body.innerHTML =
        '<b>📈 近 7 日表現趨勢圖 <span class="pill green" style="font-size:11px;">專業版</span></b>' +
        '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px;">' +
          '<span style="font-size:13px;">🔒 ' + (setMode ? '設定 PIN 查看你的 7 日趨勢' : '輸入 PIN 查看你的 7 日趨勢') + '</span>' +
          '<input id="fillPin" type="tel" inputmode="numeric" maxlength="4" placeholder="••••" autocomplete="off" style="width:110px;text-align:center;letter-spacing:6px;">' +
          '<button class="btn btn-sm btn-primary" id="fillPinGo">' + (setMode ? '設定' : '查看') + '</button></div>';
      $('#fillPinGo').onclick = async function () {
        var pin = ($('#fillPin').value || '').trim();
        if (!/^\d{4}$/.test(pin)) { toast('請輸入 4 位數字 PIN', true); return; }
        if (setMode) {
          var sr = await TP.call('setPerfPin', { t: shareToken, athleteId: ctx.athleteId, pin: pin });
          if (!sr.ok) { toast(sr.error || '設定失敗', true); return; }
        }
        ctx.pin = pin; ctx.prefillPinNeeded = false;
        loadSeven(true);
      };
    }

    async function loadSeven(alsoPrefill) {
      body.innerHTML = '<p class="muted" style="font-size:13px;">載入中…</p>';
      var r = await TP.call('myRecords', { t: shareToken, athleteId: ctx.athleteId, pin: ctx.pin, limit: 7 });
      if (!r.ok) {
        if (r.pinRequired) { ctx.pin = ''; toast('PIN 不正確', true); pinBox(false); return; }
        if (r.noPin) { pinBox(true); return; }
        body.innerHTML = '<p class="muted" style="font-size:13px;">' + esc(r.error || '載入失敗') + '</p>'; return;
      }
      var recs = r.records || [];
      ctx.last = recs[0] || null;
      if (alsoPrefill && ctx.last) prefill();
      render7(recs);
    }

    function render7(recs) {
      var head = '<b>📈 近 7 日表現趨勢圖 <span class="pill green" style="font-size:11px;">專業版</span></b>';
      if (!recs.length) {
        body.innerHTML = head + '<p class="muted" style="font-size:12px;margin-top:6px;">還沒有紀錄，今天填第一筆吧！</p>';
        return;
      }
      var asc = recs.slice().sort(function (a, b) { return String(a.date).localeCompare(String(b.date)); });
      var totals = asc.map(function (x) { return Number(x.totalScore) || 0; });
      var last = asc[asc.length - 1], lt = Number(last.totalScore) || 0, ll = last.status || TP.lightOf(lt);
      var labels = asc.map(function (x) {
        return '<span class="muted" style="font-size:10px;flex:1;text-align:center;">' + esc(String(x.date).slice(5)) + '</span>';
      }).join('');
      body.innerHTML =
        '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;">' +
          head + '<span class="pill ' + ll + '">最近 ' + lt.toFixed(1) + '</span></div>' +
        (totals.length >= 2 ? miniSpark(totals) + '<div style="display:flex;">' + labels + '</div>'
          : '<p class="muted" style="font-size:12px;margin:8px 0;">至少 2 天才畫得出折線，再多填幾天就會出現趨勢。</p>') +
        '<p class="muted" style="font-size:12px;margin:8px 0 0;">可按右上「↺ 帶入上次」沿用最近分數再微調。</p>';
    }
  }

  /* ---------- 我的近期表現 ---------- */
  $('#perfBack').onclick = function () { show('who'); };
  $('#whoPerf').onclick = async function () {
    var id = $('#whoSelect').value;
    if (!id) { toast('請先選擇選手', true); return; }
    ctx.athleteId = id;
    ctx.name = $('#whoSelect').options[$('#whoSelect').selectedIndex].text;
    $('#perfBody').innerHTML = '<p class="muted">載入中…</p>';
    show('perf');
    var st = await TP.call('perfPinStatus', { t: shareToken, athleteId: id });
    if (!st.ok) {
      // 後端尚未支援 PIN（舊版未重部署）→ 暫時沿用舊行為，避免報錯；重部署後 PIN 即生效
      var r0 = await TP.call('myRecords', { t: shareToken, athleteId: id, limit: 14 });
      renderPerf(ctx.name, (r0.ok && r0.records) ? r0.records : []);
      return;
    }
    renderPinGate(id, ctx.name, st.hasPin);
  };

  // 近期表現 PIN 關卡：未設→引導設定；已設→輸入；已驗證過→直接載入
  function renderPinGate(id, name, hasPin) {
    if (ctx.pin) {
      TP.call('myRecords', { t: shareToken, athleteId: id, pin: ctx.pin, limit: 14 }).then(function (r) {
        if (r.ok) renderPerf(name, r.records || []);
        else { ctx.pin = ''; renderPinGate(id, name, hasPin); }
      });
      return;
    }
    var setMode = !hasPin;
    $('#perfBody').innerHTML =
      '<div style="max-width:280px;margin:0 auto;text-align:center;">' +
      '<p class="muted" style="font-size:13px;">🔒 ' + (setMode
        ? '第一次查看，請設定一組 4 位數 PIN；之後只有輸入正確 PIN 才能看你的近期表現。'
        : '請輸入你的 4 位數 PIN 查看近期表現。') + '</p>' +
      '<input id="perfPin" type="tel" inputmode="numeric" maxlength="4" placeholder="••••" autocomplete="off" ' +
        'style="text-align:center;letter-spacing:8px;font-size:22px;max-width:160px;margin:0 auto;">' +
      '<button class="btn btn-primary btn-block" id="perfPinGo" style="margin-top:12px;">' + (setMode ? '設定並查看' : '確認') + '</button>' +
      (setMode ? '' : '<p class="muted" style="font-size:12px;margin-top:8px;">忘記 PIN？請找教練重設。</p>') +
      '</div>';
    $('#perfPin').focus();
    $('#perfPinGo').onclick = async function () {
      var pin = ($('#perfPin').value || '').trim();
      if (!/^\d{4}$/.test(pin)) { toast('請輸入 4 位數字 PIN', true); return; }
      if (setMode) {
        var sr = await TP.call('setPerfPin', { t: shareToken, athleteId: id, pin: pin });
        if (!sr.ok) { toast(sr.error || '設定失敗', true); return; }
      }
      var r = await TP.call('myRecords', { t: shareToken, athleteId: id, pin: pin, limit: 14 });
      if (!r.ok) {
        if (r.pinRequired) { toast('PIN 不正確', true); return; }
        if (r.noPin) { renderPinGate(id, name, false); return; }
        toast(r.error || '載入失敗', true); return;
      }
      ctx.pin = pin;
      renderPerf(name, r.records || []);
    };
  }

  function miniSpark(vals) {
    if (vals.length < 2) return '';
    var w = 300, h = 50, p = 4;
    var pts = vals.map(function (v, i) {
      var x = p + i * (w - 2 * p) / (vals.length - 1);
      var y = h - p - (v - 1) / 4 * (h - 2 * p);
      return x.toFixed(1) + ',' + y.toFixed(1);
    }).join(' ');
    return '<svg width="100%" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none" style="margin:8px 0;">' +
      '<polyline points="' + pts + '" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linejoin="round"/></svg>';
  }

  function renderPerf(name, recs) {
    if (!recs.length) {
      $('#perfBody').innerHTML = '<p class="muted">' + esc(name) + ' 還沒有任何回報紀錄，今天填第一筆吧！</p>';
      return;
    }
    var asc = recs.slice().sort(function (a, b) { return String(a.date).localeCompare(String(b.date)); });
    var last = asc[asc.length - 1];
    var total = Number(last.totalScore) || 0, light = last.status || TP.lightOf(total);
    var totals = asc.map(function (r) { return Number(r.totalScore) || 0; });

    var dims = TP.KPI_DIMENSIONS.map(function (d) {
      var key = d.key + 'Avg';
      return '<div class="row" style="padding:6px 0;"><span>' + esc(d.name) + '</span><b>' + (Number(last[key]) || 0).toFixed(1) + '</b></div>';
    }).join('');

    var listDesc = recs.slice().sort(function (a, b) { return String(b.date).localeCompare(String(a.date)); });
    var rows = listDesc.map(function (r) {
      var t = Number(r.totalScore) || 0, l = r.status || TP.lightOf(t);
      return '<div class="row"><span><span class="dot ' + l + '"></span> ' + esc(String(r.date)) + '</span>' +
        '<span class="pill ' + l + '">' + t.toFixed(1) + '</span></div>';
    }).join('');

    var fb = last.coachComment && String(last.coachComment).trim();
    $('#perfBody').innerHTML =
      '<div class="center"><div style="font-size:40px;font-weight:800;color:' +
        (light === 'green' ? 'var(--green)' : light === 'yellow' ? 'var(--yellow)' : 'var(--red)') + ';">' + total.toFixed(1) + '</div>' +
        '<span class="pill ' + light + '">最近一次・' + TP.lightText(light) + '（' + esc(String(last.date)) + '）</span></div>' +
      (fb ? '<div class="card" style="background:rgba(34,197,94,.08);border-color:var(--brand);margin-top:12px;">' +
        '<b style="color:var(--brand);">👨‍🏫 教練回饋</b><div style="margin-top:4px;white-space:pre-wrap;">' + esc(last.coachComment) + '</div></div>' : '') +
      (totals.length >= 2 ? '<h3 style="margin:14px 0 0;">總分趨勢</h3>' + miniSpark(totals) : '') +
      '<h3 style="margin:14px 0 6px;">最近一次六大面向</h3>' + dims +
      '<h3 style="margin:14px 0 6px;">歷史紀錄</h3>' + rows;
  }

  $('#btnPrefill').onclick = async function () {
    if (ctx.last) { prefill(); return; }
    if (ctx.prefillPinNeeded) {
      var pin = ctx.pin || (window.prompt('請輸入你的 4 位數 PIN 以帶入上次分數') || '').trim();
      if (!/^\d{4}$/.test(pin)) { toast('請輸入 4 位數字 PIN', true); return; }
      var r = await TP.call('lastRecord', { t: shareToken, athleteId: ctx.athleteId, pin: pin });
      if (r.pinRequired) { toast('PIN 不正確', true); return; }
      ctx.pin = pin; ctx.last = (r.ok && r.record) || null;
      if (ctx.last) prefill(); else toast('沒有上次紀錄可帶入');
    } else { toast('沒有上次紀錄可帶入'); }
  };
  function prefill() {
    if (!ctx.last) { toast('沒有上次紀錄可帶入'); return; }
    TP.KPI_DIMENSIONS.forEach(function (dim) {
      dim.items.forEach(function (it) {
        var v = Number(ctx.last[it[0]]);
        if (v >= 1 && v <= 5) { var inp = $('#kpi_' + it[0]); inp.value = v; onSlide(inp); }
      });
    });
    ['heightCm', 'weightKg', 'targetWeightKg'].forEach(function (k) { if (ctx.last[k]) $('#' + k).value = ctx.last[k]; });
    updateBmi();
    toast('已帶入上次分數，微調有變化的即可');
  }

  /* ---------- 導覽 ---------- */
  var stepOrder = ['kpi', 'body'];
  var cur = 'kpi';
  $('#navNext').onclick = function () {
    if (cur === 'kpi') { cur = 'body'; show('body'); }
    else if (cur === 'body') { submit(); }
  };
  $('#navPrev').onclick = function () {
    if (cur === 'body') { cur = 'kpi'; show('kpi'); }
    else if (cur === 'kpi') { show('who'); }
  };

  // 心情
  var mood = 0;
  TP.$all('#moodRow button').forEach(function (b) {
    b.onclick = function () {
      mood = Number(b.dataset.m);
      TP.$all('#moodRow button').forEach(function (x) { x.classList.remove('sel'); });
      b.classList.add('sel');
    };
  });

  /* ---------- 送出 ---------- */
  function collectScores() {
    var s = {};
    TP.KPI_DIMENSIONS.forEach(function (dim) {
      dim.items.forEach(function (it) { s[it[0]] = Number($('#kpi_' + it[0]).value); });
    });
    return s;
  }

  function buildAdvice(scores, payload) {
    var tips = [];
    var phys = ['pio_sleep', 'pio_spirit', 'pio_soreness', 'pio_injury', 'pio_recovery'];
    var recovery = phys.reduce(function (a, k) { return a + Number(scores[k] || 0); }, 0) / phys.length;
    if (recovery <= 2.5) tips.push('恢復偏低：今晚提早就寢、補充蛋白質與水分，明日訓練量先降一階。');
    else if (recovery <= 3.5) tips.push('恢復普通：訓練後 30 分鐘內補碳水＋蛋白，做足收操伸展。');
    else tips.push('恢復良好：維持目前作息，訓練後正常補給即可。');

    if (Number(scores.pio_injury) <= 2) tips.push('⚠️ 傷勢安全度偏低，請主動告知教練、必要時就醫評估，勿硬撐。');
    if (Number(scores.pio_soreness) <= 2) tips.push('肌肉痠痛明顯：加強滾筒放鬆與輕度活動，避免連續高強度。');
    if (!payload.breakfast) tips.push('今天沒記錄早餐：訓練選手務必吃早餐，建議優質碳水＋蛋白質。');
    if (payload.lateNightSnack) tips.push('有吃宵夜：盡量避免高油高糖宵夜，影響睡眠與體重控制。');

    // 受傷部位
    if (payload.injuryAreas && payload.injuryAreas !== '無受傷')
      tips.push('🩹 回報傷處：' + payload.injuryAreas + '。請降低該部位負荷、做好防護，並讓教練評估是否調整訓練。');

    // 睡眠時間
    var sleep = Number(payload.sleepHours);
    if (sleep && sleep < 7) tips.push('睡眠僅 ' + sleep + ' 小時：青少年選手建議 8 小時以上，睡眠不足會直接拖累恢復與表現。');

    // 疲勞監控 1–10
    var fat = Number(payload.fatigue);
    if (fat >= 8) tips.push('⚠️ 疲勞指數 ' + fat + '/10 偏高：今日以恢復為主，注意補水與睡眠，明日訓練量建議下修。');
    else if (fat >= 7) tips.push('疲勞指數 ' + fat + '/10：留意累積疲勞，訓練後確實收操與補給。');

    // 三餐營養涵蓋
    var allNutri = [].concat(
      (payload.breakfastNutri || '').split(','), (payload.lunchNutri || '').split(','), (payload.dinnerNutri || '').split(',')
    ).filter(Boolean);
    if (allNutri.length) {
      if (allNutri.indexOf('蛋白質') === -1) tips.push('今日三餐未標記蛋白質：肌肉修復需要，建議每餐補充（蛋/肉/豆/乳）。');
      if (allNutri.indexOf('蔬菜') === -1 && allNutri.indexOf('水果') === -1) tips.push('蔬果攝取不足：補充蔬菜水果有助恢復與免疫。');
    }
    if (payload.targetWeightKg && payload.weightKg) {
      var gap = Number(payload.weightKg) - Number(payload.targetWeightKg);
      if (gap > 1) tips.push('距離目標體重還差 ' + gap.toFixed(1) + ' kg：控制精緻糖與油炸，搭配有氧。');
      else if (gap < -1) tips.push('體重低於目標 ' + (-gap).toFixed(1) + ' kg：注意熱量與蛋白質攝取，避免掉肌肉。');
    }
    return tips;
  }

  async function submit() {
    // 個資法：送出前強制同意
    if (!$('#consentPrivacy').checked) { toast('請先閱讀並勾選隱私權與資料使用同意後再送出。', true); return; }
    if (!$('#guardianConsent').checked) { toast('未滿 18 歲請先確認家長/法定代理人已同意。', true); return; }
    var scores = collectScores();
    var payload = {
      t: shareToken, athleteId: ctx.athleteId, date: ($('#recordDate').value || localToday()),
      sessionType: $('#sessionType').value, scores: scores,
      heightCm: $('#heightCm').value, weightKg: $('#weightKg').value, targetWeightKg: $('#targetWeightKg').value,
      breakfast: $('#breakfast').value, lunch: $('#lunch').value, dinner: $('#dinner').value,
      snacksDrinks: $('#snacksDrinks').value, waterIntake: $('#waterIntake').value, lateNightSnack: $('#lateNightSnack').value,
      moodIndex: mood, moodReason: $('#moodReason').value, gratitude: $('#gratitude').value, reflection: $('#reflection').value,
      // 個資法同意紀錄
      athleteName: ctx.name, teamId: (ctx.team && ctx.team.teamId) || '',
      consentPrivacy: true, guardianConsent: $('#guardianConsent').checked,
      consentAt: new Date().toISOString(), privacyVersion: '2026-06',
      consentText: '已閱讀並同意 TeamPro 隱私權與資料使用說明',
      deviceInfo: (navigator.userAgent || '').slice(0, 180)
    };
    Object.assign(payload, collectExtras());
    var tips = buildAdvice(scores, payload);
    payload.nutritionAdvice = tips.join('\n');

    $('#navNext').textContent = '送出中…'; $('#navNext').disabled = true;
    var r = await TP.call('submitRecord', payload);
    $('#navNext').textContent = '下一步 →'; $('#navNext').disabled = false;
    if (!r.ok) { toast(r.error || '送出失敗', true); return; }

    ctx.result = r;
    showResult(r, payload, tips);
    show('result');
  }

  function showResult(r, payload, tips) {
    var total = Number(r.totalScore) || 0;
    var light = r.status || TP.lightOf(total);
    $('#resScore').textContent = total.toFixed(1);
    $('#resScore').style.color = light === 'green' ? 'var(--green)' : (light === 'yellow' ? 'var(--yellow)' : 'var(--red)');
    $('#resLight').innerHTML = '<span class="pill ' + light + '">' + TP.lightText(light) + '</span>';
    $('#resDims').innerHTML = TP.KPI_DIMENSIONS.map(function (d) {
      return esc(d.name) + ' ' + (Number(r.dimAvg[d.key]) || 0).toFixed(1);
    }).join('　');
    $('#resAdvice').innerHTML = tips.map(function (t) { return '• ' + esc(t); }).join('<br>');

    var studentText = '【' + ctx.name + ' 今日回報】\n總分 ' + total.toFixed(1) + '（' + TP.lightText(light) + '）\n' +
      TP.KPI_DIMENSIONS.map(function (d) { return d.name + ' ' + (Number(r.dimAvg[d.key]) || 0).toFixed(1); }).join('・') +
      '\n建議：' + tips[0];
    // 家長版只給「整理後摘要」：不含原始分數、燈號標籤、受傷/睡眠等敏感原文
    var hasSensitive = (light === 'red') || (payload.injuryAreas && payload.injuryAreas !== '無受傷');
    var parentText = '家長您好：\n' + TP.parentSummary({ name: ctx.name, light: light, private: hasSensitive }) +
      '\n\n感謝您的陪伴與支持 🙏';

    $('#btnCopyStudent').onclick = function () { TP.copy(studentText); };
    $('#btnCopyParent').onclick = function () { TP.copy(parentText); };
  }

  $('#btnAgain').onclick = function () { location.reload(); };

  boot();
})();
</script>
</body>
</html>

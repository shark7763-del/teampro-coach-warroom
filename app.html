<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeamPro 教練後台</title>
<link rel="stylesheet" href="style.css">
<style>
  .auth-wrap { max-width: 420px; margin: 60px auto; }
  .auth-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .auth-tabs button { flex: 1; }
  .plan-banner { display:flex; align-items:center; justify-content:space-between; gap:12px;
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; flex-wrap:wrap; }
  .quota-bar { height: 8px; background: var(--panel-2); border-radius: 999px; overflow: hidden; margin-top: 6px; }
  .quota-bar > i { display:block; height:100%; background: var(--brand); }
  .quota-bar > i.warn { background: var(--yellow); }
  .quota-bar > i.full { background: var(--red); }
  .link-box { display:flex; gap:8px; }
  .link-box input { font-size: 13px; }
  .upgrade { border:1px solid var(--yellow); background: rgba(245,158,11,.08); border-radius:12px; padding:14px; }

  /* ===== 成果報告（淺色，印出好看、省墨）===== */
  .report-doc { background:#fff; color:#1a2230; border-radius:14px; padding:28px; max-width:820px; margin:0 auto;
    box-shadow:0 10px 30px rgba(0,0,0,.3); font-size:14px; }
  .report-doc h2,.report-doc h3 { color:#0f1115; margin:0; }
  .rp-head { display:flex; justify-content:space-between; align-items:flex-start; border-bottom:2px solid #0f1115; padding-bottom:12px; }
  .rp-brand { color:#16a34a; font-weight:800; }
  .rp-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:18px 0; }
  .rp-stat { background:#f3f5f8; border-radius:10px; padding:12px; text-align:center; }
  .rp-stat .n { font-size:24px; font-weight:800; }
  .rp-stat .l { color:#5b6675; font-size:12px; }
  .rp-dim { display:flex; align-items:center; gap:10px; margin:7px 0; }
  .rp-dim .name { width:48px; font-weight:700; }
  .rp-bar { flex:1; height:14px; background:#e7ebf0; border-radius:999px; overflow:hidden; }
  .rp-bar > i { display:block; height:100%; background:linear-gradient(90deg,#22c55e,#16a34a); }
  .rp-dim .val { width:96px; text-align:right; font-variant-numeric:tabular-nums; }
  .rp-delta.up { color:#16a34a; } .rp-delta.down { color:#dc2626; } .rp-delta.flat { color:#5b6675; }
  .rp-section { margin-top:18px; }
  .rp-light { display:inline-block; padding:2px 10px; border-radius:999px; font-weight:700; font-size:12px; }
  .rp-light.green{background:#dcfce7;color:#15803d;} .rp-light.yellow{background:#fef3c7;color:#b45309;} .rp-light.red{background:#fee2e2;color:#b91c1c;}
  .rp-comment { background:#f3f5f8; border-left:4px solid #16a34a; border-radius:8px; padding:12px 14px; white-space:pre-wrap; }
  .rp-foot { margin-top:20px; border-top:1px solid #d6dce4; padding-top:10px; color:#5b6675; font-size:12px; }

  @media print {
    body { background:#fff; }
    body * { visibility:hidden; }
    #reportArea, #reportArea * { visibility:visible; }
    #reportArea { position:absolute; left:0; top:0; width:100%; }
    .report-doc { box-shadow:none; max-width:none; }
    .no-print { display:none !important; }
  }
</style>
</head>
<body>

<!-- ===== 登入 / 註冊 ===== -->
<div id="authView" class="container hidden">
  <div class="topbar"><div class="logo">🥋 TeamPro <span class="mark">教練戰情室</span></div>
    <a class="btn btn-ghost btn-sm" href="index.html">回首頁</a></div>
  <div class="auth-wrap card">
    <div class="auth-tabs">
      <button class="btn" id="tabLogin">登入</button>
      <button class="btn" id="tabSignup">註冊</button>
    </div>
    <div id="signupFields" class="hidden">
      <label>教練姓名</label><input id="suName" placeholder="王教練">
    </div>
    <label>Email</label><input id="auEmail" type="email" placeholder="coach@example.com">
    <label>密碼</label><input id="auPassword" type="password" placeholder="至少 6 碼">
    <div style="margin-top:16px;">
      <button class="btn btn-primary btn-block" id="authSubmit">登入</button>
    </div>
    <p class="muted" id="authHint" style="font-size:13px;margin-top:12px;"></p>
    <hr style="border-color:var(--line);margin:18px 0;">
    <details>
      <summary class="muted" style="cursor:pointer;font-size:13px;">⚙️ 系統設定（後端網址）</summary>
      <label>GAS Web App /exec 網址</label>
      <input id="cfgUrl" placeholder="https://script.google.com/macros/s/XXXX/exec">
      <button class="btn btn-sm" id="cfgSave" style="margin-top:8px;">儲存網址</button>
    </details>
  </div>
</div>

<!-- ===== 主後台 ===== -->
<div id="appView" class="container hidden">
  <div class="topbar">
    <div class="logo">🥋 TeamPro <span class="mark">教練戰情室</span></div>
    <div style="display:flex;gap:8px;align-items:center;">
      <span class="muted" id="coachName" style="font-size:14px;"></span>
      <button class="btn btn-ghost btn-sm" id="btnLogout">登出</button>
    </div>
  </div>

  <div class="plan-banner">
    <div>
      <b id="planLabel">免費版</b>
      <span class="muted" id="planQuota"> · 選手 0 / 5</span>
      <div class="quota-bar"><i id="quotaFill" style="width:0%"></i></div>
    </div>
    <div id="planExpiryNote" class="muted" style="font-size:13px;"></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="warroom">📊 今日戰情室</button>
    <button class="tab-btn" data-tab="athletes">🧑‍🤝‍🧑 選手管理</button>
    <button class="tab-btn" data-tab="teams">🔗 團隊與連結</button>
    <button class="tab-btn" data-tab="report">📄 成果報告</button>
    <button class="tab-btn" data-tab="settings">⚙️ 設定</button>
  </div>

  <!-- 戰情室 -->
  <section id="tab-warroom">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;">
      <select id="warTeam" style="max-width:220px;"></select>
      <input id="warDate" type="date" style="max-width:170px;">
      <button class="btn btn-sm" id="warRefresh">重新整理</button>
    </div>
    <div class="grid grid-4" style="margin-bottom:16px;">
      <div class="stat"><div class="num" id="stCompletion">0%</div><div class="lbl">今日完成率</div></div>
      <div class="stat"><div class="num" id="stGreen" style="color:var(--green)">0</div><div class="lbl">🟢 綠燈</div></div>
      <div class="stat"><div class="num" id="stYellow" style="color:var(--yellow)">0</div><div class="lbl">🟡 黃燈</div></div>
      <div class="stat"><div class="num" id="stRed" style="color:var(--red)">0</div><div class="lbl">🔴 紅燈</div></div>
    </div>
    <div class="grid grid-2">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <h3 style="margin:0;">❗ 今日未繳 <span id="missCount" class="muted"></span></h3>
          <button class="btn btn-sm" id="btnRemind">📋 複製催繳 LINE</button>
        </div>
        <div id="missList" style="margin-top:10px;"></div>
      </div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <h3 style="margin:0;">✅ 已繳交</h3>
          <button class="btn btn-sm" id="btnParentNotify">👨‍👩‍👧 家長通知文字</button>
        </div>
        <div id="doneList" style="margin-top:10px;"></div>
      </div>
    </div>
  </section>

  <!-- 選手管理 -->
  <section id="tab-athletes" class="hidden">
    <div class="card">
      <h3 style="margin-top:0;">新增選手</h3>
      <div id="quotaWarn"></div>
      <div class="grid grid-4">
        <div><label>姓名</label><input id="naName" placeholder="選手姓名"></div>
        <div><label>所屬團隊</label><select id="naTeam"></select></div>
        <div><label>年級班級（選填）</label><input id="naGrade" placeholder="八年級"></div>
        <div style="display:flex;align-items:flex-end;"><button class="btn btn-primary btn-block" id="btnAddAthlete">＋ 新增</button></div>
      </div>
    </div>
    <div class="card">
      <h3 style="margin-top:0;">選手名單</h3>
      <div id="athleteList"></div>
    </div>
  </section>

  <!-- 團隊與連結 -->
  <section id="tab-teams" class="hidden">
    <div class="card">
      <h3 style="margin-top:0;">建立團隊</h3>
      <div class="grid grid-3">
        <div><label>團隊名稱</label><input id="ntName" placeholder="例：跆拳道隊 / 田徑隊 / 籃球隊"></div>
        <div><label>運動項目</label><input id="ntSport" value="跆拳道"></div>
        <div style="display:flex;align-items:flex-end;"><button class="btn btn-primary btn-block" id="btnCreateTeam">＋ 建立團隊</button></div>
      </div>
    </div>
    <div class="card">
      <h3 style="margin-top:0;">我的團隊與填寫連結</h3>
      <div id="teamList"></div>
    </div>
  </section>

  <!-- 成果報告 -->
  <section id="tab-report" class="hidden">
    <div class="card no-print">
      <h3 style="margin-top:0;">產生成果報告</h3>
      <div class="grid grid-4">
        <div><label>報告類型</label>
          <select id="rpType"><option value="athlete">個人選手</option><option value="team">團隊整體</option></select>
        </div>
        <div id="rpAthleteWrap"><label>選手</label><select id="rpAthlete"></select></div>
        <div id="rpTeamWrap" style="display:none;"><label>團隊</label><select id="rpTeam"></select></div>
        <div><label>期間</label>
          <select id="rpRange">
            <option value="7">近 7 天</option>
            <option value="30" selected>近 30 天</option>
            <option value="90">近 90 天</option>
            <option value="custom">自訂</option>
          </select>
        </div>
        <div id="rpCustomFrom" style="display:none;"><label>起</label><input id="rpFrom" type="date"></div>
        <div id="rpCustomTo" style="display:none;"><label>迄</label><input id="rpTo" type="date"></div>
        <div style="display:flex;align-items:flex-end;"><button class="btn btn-primary btn-block" id="btnGenReport">產生報告</button></div>
      </div>
      <label>教練評語（會印在報告上）</label>
      <textarea id="rpComment" placeholder="這段期間的整體表現、亮點與下一步建議…"></textarea>
      <div style="margin-top:10px;display:flex;gap:8px;">
        <button class="btn" id="btnPrint">🖨️ 列印 / 存成 PDF</button>
        <span class="muted" style="font-size:13px;align-self:center;">列印視窗選「另存為 PDF」即可匯出檔案給家長/學校。</span>
      </div>
    </div>
    <div id="reportArea"></div>
  </section>

  <!-- 設定 -->
  <section id="tab-settings" class="hidden">
    <div class="card">
      <h3 style="margin-top:0;">系統設定</h3>
      <label>後端網址（GAS /exec）</label>
      <div class="link-box"><input id="setUrl"><button class="btn" id="setUrlSave">儲存</button></div>
      <p class="muted" style="font-size:13px;">升級付費方案請與我們聯絡，由管理者於後台手動開通。</p>
    </div>
  </section>
</div>

<script src="api.js"></script>
<script>
(function () {
  var $ = TP.$, esc = TP.esc, toast = TP.toast;
  var authView = $('#authView'), appView = $('#appView');
  var mode = 'login';
  var state = { coach: null, teams: [], athletes: [] };
  var params = new URLSearchParams(location.search);
  var DEMO = params.get('demo') === '1';

  /* ---------- 啟動 ---------- */
  function boot() {
    if (DEMO) { enterDemo(); return; }
    if (params.get('signup') === '1') mode = 'signup';
    if (TP.getToken()) {
      TP.callAuth('me').then(function (r) {
        if (r.ok) { state.coach = r.coach; showApp(); }
        else { showAuth(); }
      });
    } else { showAuth(); }
  }

  function showAuth() {
    authView.classList.remove('hidden'); appView.classList.add('hidden');
    $('#cfgUrl').value = TP.getUrl();
    setMode(mode);
  }
  function setMode(m) {
    mode = m;
    $('#tabLogin').className = 'btn' + (m === 'login' ? ' btn-primary' : '');
    $('#tabSignup').className = 'btn' + (m === 'signup' ? ' btn-primary' : '');
    $('#signupFields').classList.toggle('hidden', m !== 'signup');
    $('#authSubmit').textContent = (m === 'signup') ? '免費註冊' : '登入';
    $('#authHint').textContent = (m === 'signup')
      ? '註冊即免費開通，自動附一個示範團隊讓你立刻上手。'
      : '';
  }

  $('#tabLogin').onclick = function () { setMode('login'); };
  $('#tabSignup').onclick = function () { setMode('signup'); };
  $('#cfgSave').onclick = function () { TP.setUrl($('#cfgUrl').value); toast('已儲存後端網址'); };

  $('#authSubmit').onclick = async function () {
    if (!TP.getUrl()) { toast('請先在下方系統設定貼上後端網址', true); return; }
    var email = $('#auEmail').value.trim(), pw = $('#auPassword').value;
    if (!email || !pw) { toast('請輸入 email 與密碼', true); return; }
    var r;
    if (mode === 'signup') {
      var name = $('#suName').value.trim();
      if (!name) { toast('請輸入教練姓名', true); return; }
      r = await TP.call('register', { email: email, password: pw, name: name });
    } else {
      r = await TP.call('login', { email: email, password: pw });
    }
    if (!r.ok) { toast(r.error || '失敗', true); return; }
    TP.setToken(r.token); state.coach = r.coach;
    toast(mode === 'signup' ? '註冊成功，歡迎！' : '登入成功');
    showApp();
  };

  /* ---------- 主後台 ---------- */
  function showApp() {
    authView.classList.add('hidden'); appView.classList.remove('hidden');
    $('#coachName').textContent = state.coach.name + '（' + state.coach.email + '）';
    $('#setUrl').value = TP.getUrl();
    renderPlan();
    $('#warDate').value = new Date().toISOString().slice(0, 10);
    loadTeams().then(function () { loadAthletes(); loadWarroom(); });
  }

  function renderPlan() {
    var c = state.coach;
    $('#planLabel').textContent = c.planName + (c.expired ? '（已到期，暫以免費版限制）' : '');
    $('#planQuota').textContent = ' · 選手 ' + c.activeAthletes + ' / ' + c.maxAthletes;
    var pct = Math.min(100, Math.round(c.activeAthletes / c.maxAthletes * 100));
    var fill = $('#quotaFill'); fill.style.width = pct + '%';
    fill.className = pct >= 100 ? 'full' : (pct >= 80 ? 'warn' : '');
    $('#planExpiryNote').textContent = c.planExpiry ? ('到期日：' + String(c.planExpiry).slice(0, 10)) : '';
  }

  async function refreshMe() {
    var r = await TP.callAuth('me'); if (r.ok) { state.coach = r.coach; renderPlan(); }
  }

  $('#btnLogout').onclick = async function () {
    if (DEMO) { location.href = 'index.html'; return; }
    await TP.callAuth('logout'); TP.clearToken(); location.reload();
  };

  // tabs
  TP.$all('.tab-btn').forEach(function (b) {
    b.onclick = function () {
      TP.$all('.tab-btn').forEach(function (x) { x.classList.remove('active'); });
      b.classList.add('active');
      ['warroom', 'athletes', 'teams', 'report', 'settings'].forEach(function (t) {
        $('#tab-' + t).classList.toggle('hidden', t !== b.dataset.tab);
      });
    };
  });

  /* ---------- 團隊 ---------- */
  async function loadTeams() {
    var r = await TP.callAuth('listTeams');
    state.teams = (r.ok && r.teams) || [];
    var opts = '<option value="">全部團隊</option>' + state.teams.map(function (t) {
      return '<option value="' + t.teamId + '">' + esc(t.teamName) + '</option>';
    }).join('');
    $('#warTeam').innerHTML = opts;
    $('#naTeam').innerHTML = state.teams.length
      ? state.teams.map(function (t) { return '<option value="' + t.teamId + '">' + esc(t.teamName) + '</option>'; }).join('')
      : '<option value="">（請先建立團隊）</option>';
    $('#rpTeam').innerHTML = '<option value="">全部團隊</option>' + state.teams.map(function (t) {
      return '<option value="' + t.teamId + '">' + esc(t.teamName) + '</option>';
    }).join('');
    renderTeams();
  }

  function shareUrl(token) {
    var base = location.href.replace(/app\.html.*$/, 'join.html') + '?t=' + token;
    // 帶上後端網址，選手開連結即可用，免設定（後端網址本來就是公開的）
    var api = TP.getUrl();
    return api ? (base + '&api=' + encodeURIComponent(api)) : base;
  }

  function renderTeams() {
    var box = $('#teamList');
    if (!state.teams.length) { box.innerHTML = '<p class="muted">尚無團隊，先建立一個吧。</p>'; return; }
    box.innerHTML = state.teams.map(function (t) {
      var url = shareUrl(t.shareToken);
      return '<div class="row" style="flex-wrap:wrap;">' +
        '<div><b>' + esc(t.teamName) + '</b> <span class="muted">· ' + esc(t.sport) + '</span></div>' +
        '<div class="link-box" style="flex:1;min-width:280px;">' +
          '<input readonly value="' + esc(url) + '">' +
          '<button class="btn btn-sm" data-copy="' + esc(url) + '">複製</button>' +
          '<button class="btn btn-sm btn-danger" data-reset="' + t.teamId + '">重設連結</button>' +
          '<button class="btn btn-sm btn-danger" data-del="' + t.teamId + '" data-name="' + esc(t.teamName) + '">刪除</button>' +
        '</div></div>';
    }).join('');
    TP.$all('[data-copy]', box).forEach(function (b) { b.onclick = function () { TP.copy(b.dataset.copy); }; });
    TP.$all('[data-reset]', box).forEach(function (b) {
      b.onclick = async function () {
        if (DEMO) { demoBlock(); return; }
        if (!confirm('重設後舊連結立即失效，需重新分享給選手。確定？')) return;
        var r = await TP.callAuth('resetShareToken', { teamId: b.dataset.reset });
        if (r.ok) { toast('連結已重設'); loadTeams(); } else { toast(r.error, true); }
      };
    });
    TP.$all('[data-del]', box).forEach(function (b) {
      b.onclick = async function () {
        if (DEMO) { demoBlock(); return; }
        var cnt = state.athletes.filter(function (a) { return String(a.teamId) === String(b.dataset.del); }).length;
        if (!confirm('確定刪除團隊「' + b.dataset.name + '」？\n會一併刪除該隊 ' + cnt + ' 位選手與其所有填寫紀錄，無法復原。')) return;
        var r = await TP.callAuth('deleteTeam', { teamId: b.dataset.del });
        if (r.ok) { toast('已刪除（選手 ' + r.deletedAthletes + '、紀錄 ' + r.deletedRecords + '）'); await refreshMe(); loadTeams(); loadAthletes(); }
        else { toast(r.error, true); }
      };
    });
  }

  $('#btnCreateTeam').onclick = async function () {
    if (DEMO) { demoBlock(); return; }
    var name = $('#ntName').value.trim();
    if (!name) { toast('請輸入團隊名稱', true); return; }
    // 前端防呆：同名團隊已存在就擋（後端另有最終把關）
    if (state.teams.some(function (t) { return String(t.teamName).trim() === name; })) {
      toast('已有同名團隊「' + name + '」', true); return;
    }
    var btn = this; btn.disabled = true;
    var r = await TP.callAuth('createTeam', { teamName: name, sport: $('#ntSport').value.trim() });
    if (r.ok) { $('#ntName').value = ''; toast('團隊已建立'); loadTeams(); } else { toast(r.error, true); }
    btn.disabled = false;
  };

  /* ---------- 選手 ---------- */
  async function loadAthletes() {
    var r = await TP.callAuth('listAthletes');
    state.athletes = (r.ok && r.athletes) || [];
    renderAthletes();
    renderQuotaWarn();
    fillReportAthletes();
  }

  function fillReportAthletes() {
    var actives = state.athletes.filter(function (a) { return String(a.active) !== 'false' && a.active !== false; });
    $('#rpAthlete').innerHTML = actives.length
      ? actives.map(function (a) { return '<option value="' + a.athleteId + '">' + esc(a.name) + '</option>'; }).join('')
      : '<option value="">（尚無選手）</option>';
  }

  function renderQuotaWarn() {
    var c = state.coach;
    var box = $('#quotaWarn');
    if (c.activeAthletes >= c.maxAthletes) {
      box.innerHTML = '<div class="upgrade">⚠️ 已達 <b>' + esc(c.planName) + '</b> 上限（' + c.maxAthletes +
        ' 人）。升級方案即可新增更多選手，請與我們聯絡由管理者開通。</div>';
    } else { box.innerHTML = ''; }
  }

  function renderAthletes() {
    var box = $('#athleteList');
    if (!state.athletes.length) { box.innerHTML = '<p class="muted">尚無選手。</p>'; return; }
    var teamName = {}; state.teams.forEach(function (t) { teamName[t.teamId] = t.teamName; });
    box.innerHTML = state.athletes.map(function (a) {
      var active = String(a.active) !== 'false' && a.active !== false;
      return '<div class="row">' +
        '<div><b>' + esc(a.name) + '</b> <span class="muted">· ' + esc(teamName[a.teamId] || '未分隊') +
          (a.gradeClass ? ' · ' + esc(a.gradeClass) : '') + '</span>' +
          (active ? '' : ' <span class="pill red">已停用</span>') + '</div>' +

  var DIMS = [['technicalAvg', '技術'], ['tacticalAvg', '戰術'], ['physicalAvg', '體能'],

  function mean(arr) { return arr.length ? arr.reduce(function (s, v) { return s + v; }, 0) / arr.length : 0; }
  function num(v) { return Number(v) || 0; }

  function sparkline(vals) {
    if (vals.length < 2) return '';
    var w = 320, h = 56, pad = 4, max = 5, min = 1;
    var pts = vals.map(function (v, i) {
      var x = pad + i * (w - 2 * pad) / (vals.length - 1);
      var y = h - pad - (v - min) / (max - min) * (h - 2 * pad);
      return x.toFixed(1) + ',' + y.toFixed(1);
    }).join(' ');
    return '<svg width="100%" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none" style="margin-top:6px;">' +
      '<polyline points="' + pts + '" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linejoin="round"/></svg>';
  }

  function isPro() { return state.coach && state.coach.effectivePlan === 'pro'; }

  /* 純 SVG 六角雷達圖（dims: [{name, value(0–5)}]） */
  function radarSvg(dims) {
    var n = dims.length, cx = 110, cy = 110, R = 78, max = 5;
    function pt(i, r) { var a = -Math.PI / 2 + i * 2 * Math.PI / n; return [cx + r * Math.cos(a), cy + r * Math.sin(a)]; }
    var rings = '';
    for (var g = 1; g <= 5; g++) {
      var poly = []; for (var i = 0; i < n; i++) { var p = pt(i, R * g / 5); poly.push(p[0].toFixed(1) + ',' + p[1].toFixed(1)); }
      rings += '<polygon points="' + poly.join(' ') + '" fill="none" stroke="#e0e5ec" stroke-width="1"/>';
    }
    var axes = '', labels = '';
    for (var i = 0; i < n; i++) {
      var p = pt(i, R); axes += '<line x1="' + cx + '" y1="' + cy + '" x2="' + p[0].toFixed(1) + '" y2="' + p[1].toFixed(1) + '" stroke="#e0e5ec"/>';
      var lp = pt(i, R + 17);
      labels += '<text x="' + lp[0].toFixed(1) + '" y="' + lp[1].toFixed(1) + '" font-size="12" fill="#5b6675" text-anchor="middle" dominant-baseline="middle">' + esc(dims[i].name) + '</text>';
    }
    var vp = []; for (var j = 0; j < n; j++) { var v = Math.max(0, Math.min(max, num(dims[j].value))); var q = pt(j, R * v / max); vp.push(q[0].toFixed(1) + ',' + q[1].toFixed(1)); }
    var val = '<polygon points="' + vp.join(' ') + '" fill="rgba(22,163,74,.25)" stroke="#16a34a" stroke-width="2"/>';
    return '<div style="text-align:center;"><svg viewBox="0 0 220 220" width="260" height="260" style="max-width:100%;">' + rings + axes + val + labels + '</svg></div>';
  }

  function radarBlock(dims) {
    if (isPro()) return '<div class="rp-section"><h3>能力雷達圖</h3>' + radarSvg(dims) + '</div>';
    return '<div class="rp-section no-print"><h3>能力雷達圖</h3>' +
      '<div style="background:#f3f5f8;border-radius:10px;padding:22px;text-align:center;color:#5b6675;">🔒 雷達圖與進階數據圖為<b>專業版</b>功能，升級即可解鎖</div></div>';
  }

  function deltaTag(d) {
    if (d > 0.15) return '<span class="rp-delta up">▲ +' + d.toFixed(1) + '</span>';
    if (d < -0.15) return '<span class="rp-delta down">▼ ' + d.toFixed(1) + '</span>';
    return '<span class="rp-delta flat">— 持平</span>';
  }

  function renderReport(athlete, range, recs) {
    if (!recs.length) {
      $('#reportArea').innerHTML = '<div class="report-doc"><h2>查無資料</h2>' +
        '<p>' + esc(athlete.name) + ' 在 ' + range.from + ' ~ ' + range.to + ' 期間沒有填寫紀錄。</p></div>';
      return;
    }
    var totals = recs.map(function (r) { return num(r.totalScore); });
    var avg = mean(totals), first = totals[0], last = totals[totals.length - 1];
    var filled = recs.length, rate = Math.round(filled / range.days * 100);
    var lights = { green: 0, yellow: 0, red: 0 };
    recs.forEach(function (r) { var l = r.status || TP.lightOf(r.totalScore); lights[l] = (lights[l] || 0) + 1; });
    var moods = recs.map(function (r) { return num(r.moodIndex); }).filter(function (v) { return v > 0; });

    var firstRec = recs[0], lastRec = recs[recs.length - 1];
    var dimRows = DIMS.map(function (d) {
      var vals = recs.map(function (r) { return num(r[d[0]]); }).filter(function (v) { return v > 0; });
      var a = mean(vals), delta = num(lastRec[d[0]]) - num(firstRec[d[0]]);
      return { name: d[1], avg: a, delta: delta };
    });
    var best = dimRows.slice().sort(function (x, y) { return y.avg - x.avg; })[0];
    var worst = dimRows.slice().sort(function (x, y) { return x.avg - y.avg; })[0];
    var comment = $('#rpComment').value.trim();

    var html = '<div class="report-doc">' +
      '<div class="rp-head"><div>' +
        '<div class="rp-brand">🥋 TeamPro 教練戰情室</div>' +
        '<h2 style="margin:4px 0;">選手成果報告</h2></div>' +
        '<div style="text-align:right;"><div><b>' + esc(athlete.name) + '</b></div>' +
        '<div class="muted" style="color:#5b6675;">' + esc(athlete.gradeClass || '') + '</div>' +
        '<div class="muted" style="color:#5b6675;">' + range.from + ' ~ ' + range.to + '</div></div>' +
      '</div>' +

      '<div class="rp-grid">' +
        '<div class="rp-stat"><div class="n">' + avg.toFixed(1) + '</div><div class="l">平均總分</div></div>' +
        '<div class="rp-stat"><div class="n">' + deltaTag(last - first) + '</div><div class="l">期間進步</div></div>' +
        '<div class="rp-stat"><div class="n">' + rate + '%</div><div class="l">填寫率 (' + filled + '/' + range.days + '天)</div></div>' +
        '<div class="rp-stat"><div class="n">' + (moods.length ? mean(moods).toFixed(1) : '—') + '</div><div class="l">平均心情</div></div>' +
      '</div>' +

      '<div class="rp-section"><h3>總分趨勢</h3>' + sparkline(totals) +
        '<div class="muted" style="color:#5b6675;font-size:12px;">起 ' + first.toFixed(1) + ' → 末 ' + last.toFixed(1) + '</div></div>' +

      '<div class="rp-section"><h3>六大面向</h3>' +
        dimRows.map(function (d) {
          return '<div class="rp-dim"><span class="name">' + d.name + '</span>' +
            '<span class="rp-bar"><i style="width:' + (d.avg / 5 * 100) + '%"></i></span>' +
            '<span class="val">' + d.avg.toFixed(1) + ' ' + deltaTag(d.delta) + '</span></div>';
        }).join('') + '</div>' +

      radarBlock(dimRows.map(function (d) { return { name: d.name, value: d.avg }; })) +

      '<div class="rp-section rp-grid" style="grid-template-columns:1fr 1fr;">' +
        '<div class="rp-stat" style="text-align:left;"><div class="l">💪 最佳面向</div><div class="n" style="font-size:18px;">' + best.name + '（' + best.avg.toFixed(1) + '）</div></div>' +
        '<div class="rp-stat" style="text-align:left;"><div class="l">🎯 待加強面向</div><div class="n" style="font-size:18px;">' + worst.name + '（' + worst.avg.toFixed(1) + '）</div></div>' +
      '</div>' +

      '<div class="rp-section"><h3>狀態燈號分布</h3>' +
        '<span class="rp-light green">綠燈 ' + lights.green + ' 天</span> ' +
        '<span class="rp-light yellow">黃燈 ' + lights.yellow + ' 天</span> ' +
        '<span class="rp-light red">紅燈 ' + lights.red + ' 天</span></div>' +

      (comment ? '<div class="rp-section"><h3>教練評語</h3><div class="rp-comment">' + esc(comment) + '</div></div>' : '') +

      '<div class="rp-foot">本報告由 TeamPro 教練戰情室產生 · 教練：' + esc(state.coach.name) +
        ' · 產生日期：' + new Date().toISOString().slice(0, 10) +
        '<br>評分制：六大面向各 1–5 分（5 為最佳），總分為六面向等權平均。</div>' +
      '</div>';

    $('#reportArea').innerHTML = html;
  }

  function demoRecords(range) {
    var out = [], base = 3.0;
    for (var i = 0; i < 12; i++) {
      var d = new Date(); d.setDate(d.getDate() - (11 - i));
      var v = Math.min(5, +(base + i * 0.12 + (i % 3 === 0 ? 0.2 : 0)).toFixed(1));
      out.push({
        date: d.toISOString().slice(0, 10), totalScore: v, status: TP.lightOf(v),
        technicalAvg: v, tacticalAvg: Math.max(1, v - 0.3), physicalAvg: Math.min(5, v + 0.2),
        mentalAvg: Math.max(1, v - 0.4), attitudeAvg: Math.min(5, v + 0.3), physiologicalAvg: Math.max(1, v - 0.2),
        moodIndex: Math.min(5, Math.round(v))
      });
    }
    return out;
  }

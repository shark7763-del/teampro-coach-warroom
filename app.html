<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeamPro 教練戰情室｜選手訓練日誌</title>
<meta name="theme-color" content="#22c55e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="stylesheet" href="style.css?v=20260627-shell1">
<link rel="stylesheet" href="app-shell.20260627e.css">
<script src="pwa.js?v=20260627-shell1" defer></script>
<script src="native.js?v=20260627-shell1" defer></script>
</head>
<body class="app-shell">
<div id="shellRoot">
  <header class="shell-header">
    <div class="logo">
      <picture><source srcset="assets/logo.webp" type="image/webp"><img class="logo-img" src="assets/logo.png" alt="TeamPro logo" width="32" height="32" fetchpriority="high" decoding="async"></picture>
      TeamPro <span class="mark">教練戰情室</span>
    </div>
    <div class="shell-user">
      <span id="shellCoach" class="muted">載入中…</span>
      <button class="btn btn-ghost btn-sm" id="shellMore">更多</button>
      <button class="btn btn-ghost btn-sm hidden" id="shellLogout">登出</button>
    </div>
  </header>

  <main id="shellMain">
    <section id="authPanel" class="shell-card hidden">
      <h2>教練登入</h2>
      <p class="muted">登入後直接進入今日戰情室：每位選手的今日準備度、異常原因與待處理事項，一頁掌握。</p>
      <label>Email</label>
      <input id="loginEmail" type="email" autocomplete="email" placeholder="coach@example.com">
      <label>密碼</label>
      <input id="loginPassword" type="password" autocomplete="current-password" placeholder="至少 6 碼">
      <button class="btn btn-primary btn-block" id="loginBtn">登入</button>
      <p class="muted" style="font-size:12px;text-align:center;">需要註冊或完整設定時，請至「更多」開啟完整管理頁。學校行政 / 評鑑功能登入後於戰情室底部「進階」開啟。</p>
    </section>

    <section id="dashboardPanel" class="hidden">
      <div class="shell-hero">
        <div>
          <div class="eyebrow">今日戰情室</div>
          <h1>今天，每位選手該怎麼練？</h1>
          <p class="muted shell-subtitle">選手每天回報，AI 整理今日準備度與異常原因，教練 10 秒掌握全隊、做出訓練決策。</p>
        </div>
        <button class="btn btn-primary" id="quickAttendance">快速點名</button>
      </div>
      <div id="dashboardMount">
        <div class="shell-grid">
          <div class="shell-card"><div class="skel w-40"></div><div class="skel w-90"></div></div>
          <div class="shell-card"><div class="skel w-40"></div><div class="skel w-70"></div></div>
          <div class="shell-card"><div class="skel w-40"></div><div class="skel w-90"></div></div>
        </div>
      </div>
      <h2 class="section-title">60 秒日常紀錄</h2>
      <div class="coach-flow">
        <button class="flow-step" data-tab="attendance"><b>10 秒</b><span>今日點名</span></button>
        <button class="flow-step" id="focusTrainingNote"><b>20 秒</b><span>訓練日誌</span></button>
        <button class="flow-step"><b>10 秒</b><span>標記異常學生</span></button>
        <button class="flow-step"><b>10 秒</b><span>傷病 / 比賽成果</span></button>
        <button class="flow-step" id="organizeAiBtn"><b>10 秒</b><span>AI 整理送出</span></button>
      </div>
      <section class="shell-card coach-ai-card">
        <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap;">
          <div><b>AI 短文字整理</b><div class="muted" style="font-size:13px;">輸入口語紀錄，整理成正式訓練紀錄與成果摘要。</div></div>
          <button class="btn btn-sm" id="aiOrganizeNow">整理</button>
        </div>
        <textarea id="quickTrainingText" placeholder="例：今天練反擊，冠霖膝蓋不舒服，柏鈞狀態很好，瀚忠遲到。"></textarea>
        <div id="aiOrganizedOutput" class="ai-output hidden"></div>
      </section>
    </section>

    <section id="featurePanel" class="hidden">
      <div class="feature-head">
        <button class="btn btn-sm btn-ghost" id="backDashboard">← 回今日戰情室</button>
        <span id="featureTitle" class="muted">載入中…</span>
      </div>
      <div id="featureMount"></div>
    </section>
  </main>
</div>

<nav class="mobile-tabbar" id="mobileTabbar">
  <button data-tab="dashboard" class="active"><span class="ic">🏠</span>今日</button>
  <button data-tab="attendance"><span class="ic">✅</span>點名</button>
  <button data-tab="athletes"><span class="ic">🏃</span>選手</button>
  <button data-tab="training"><span class="ic">📝</span>紀錄</button>
  <button data-tab="report"><span class="ic">📊</span>報告</button>
</nav>

<script src="api.js?v=20260627-shell1"></script>
<script type="module" src="app-shell.20260627e.js?v=20260710-loop"></script>
</body>
</html>
